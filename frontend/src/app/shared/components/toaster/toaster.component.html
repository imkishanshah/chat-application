<div class="toaster-container">
  <div *ngFor="let toast of toasts" [ngClass]="getToastClasses(toast.type)" class="toast-item">
    <div class="toast-content">
      <div class="toast-header">
        <span class="toast-icon">
          <i [ngClass]="'bi ' + getIconClass(toast.type)"></i>
        </span>
        <span *ngIf="toast.title" class="toast-title">{{ toast.title }}</span>
        <button type="button" class="btn-close" (click)="dismiss(toast.id)" aria-label="Close"></button>
      </div>
      <div class="toast-message">{{ toast.message }}</div>
    </div>
    <div class="toast-progress" [style.animation-duration.ms]="toast.duration"></div>
  </div>
</div>
