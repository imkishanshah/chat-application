<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg border-0 w-100" style="max-width: 500px;">
    
    <!-- Card Header -->
    <div class="card-header bg-primary text-white text-center">
      <h4 class="mb-0">Create Account</h4>
      <small class="text-white-50">Join us and start chatting instantly</small>
    </div>

    <!-- Card Body -->
    <div class="card-body p-4">
      <form [formGroup]="userForm" (submit)="onSubmit(userForm)">

        <!-- First & Last Name -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="first_name" placeholder="First Name">
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="last_name" placeholder="Last Name">
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" placeholder="example@email.com">
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password" placeholder="Password">
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" formControlName="confirm_password" placeholder="Confirm Password">
        </div>

        <!-- Signup Button -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg" [disabled]="userForm.invalid">
            Sign Up
          </button>
        </div>
      </form>
    </div>

    <!-- Card Footer -->
    <div class="card-footer text-center bg-white border-0">
      <small class="text-muted">
        Already have an account? 
        <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Log in</a>
      </small>
    </div>
  </div>
</div>
